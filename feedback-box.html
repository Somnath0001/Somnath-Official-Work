<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            font-family: sans-serif;
            padding: 20px; /* Space around the box on mobile */
        }

        .feedback-box {
            max-width: 450px; 
            width: 100%;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
            
            /* FIX: Prevents the box from shrinking after submit */
            min-height: 450px; 
            display: flex;
            flex-direction: column;
        }

        /* Centers the Thank You message vertically in the fixed-size box */
        #success-message { 
            display: none; 
            text-align: center; 
            color: #28a745; 
            font-weight: bold; 
            margin: auto; /* Vertically and horizontally centers content */
        }

        .feedback-box h2 { margin-top: 0; font-size: 1.5rem; color: #007bff; text-align: center;}
        .field-group { margin-bottom: 15px; }
        .field-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }

        /* Responsive horizontal alignment */
        .inline-group {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
            flex-wrap: wrap; /* Allows wrapping on very small screens */
        }
        .inline-group label { margin-bottom: 0; white-space: nowrap; }

        .field-group input[type="text"], 
        .field-group input[type="email"], 
        .field-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus, textarea:focus { border-color: #007bff; outline: none; }
        input:invalid:focus, textarea:invalid:focus { border-color: #e74c3c; }

        .radio-group { display: flex; gap: 15px; }
        .radio-group label { font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px; color: #333; }

        .submit-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        .submit-btn:hover { background-color: #0056b3; }
        #success-message { display: none; text-align: center; color: #28a745; font-weight: bold; }

        /* Responsive Mobile Tweak */
        @media (max-width: 400px) {
            .inline-group {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .feedback-box {
                padding: 15px;
            }
            .feedback-box h2 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>

<div class="feedback-box">
    <div id="feedback-content">
        <h2>Feedback</h2>
        
        <form id="feedbackForm">
            <div class="field-group inline-group">
                <label>Is this helpful?*</label>
                <div class="radio-group">
                    <label><input type="radio" name="helpful" value="Yes" required> Yes</label>
                    <label><input type="radio" name="helpful" value="No"> No</label>
                </div>
            </div>

            <div class="field-group">
                <label for="suggestions">Suggestions for improvement*</label>
                <textarea id="suggestions" name="suggestions" rows="3" placeholder="Please share your thoughts..." required></textarea>
            </div>

            <div class="field-group">
                <label for="name">Your Name (Optional)</label>
                <input type="text" id="name" name="user_name" 
                       pattern="^[A-Za-z\s]+$" 
                       title="Please enter only letters and spaces">
            </div>

            <div class="field-group">
                <label for="email">Your Email (Optional)</label>
                <input type="email" id="email" name="user_email" 
                       placeholder="example@domain.com">
            </div>

            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </div>

    <!-- This will now stay centered in the 450px high box -->
    <div id="success-message">
        <div style="font-size: 3rem; margin-bottom: 10px;">✓</div>
        <h3>Thank you!</h3>
        <p style="color: #555; font-weight: normal;">Your feedback has been submitted successfully.</p>
    </div>
</div>

<script>
    document.getElementById('feedbackForm').addEventListener('submit', function(event) {
        event.preventDefault();

        // 1. YOUR GOOGLE FORM CONFIGURATION
        // Replace 'YOUR_FORM_ID' with the actual ID from your Google Form URL
        const G_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfRttp18Zf-GoOmgfe4KPmAiknJbomLsrpslZl6OI4rNuz-Hg/formResponse";

        // Replace these 'entry.XXXXX' strings with your actual entry IDs
        const fieldMappings = {
            helpful: "entry.326955045",      // Radio button ID
            suggestions: "entry.1696159737",  // Textarea ID
            user_name: "entry.485428648",    // Name ID
            user_email: "entry.1521491267"    // Email ID
        };

        // 2. PREPARE THE DATA
        const formData = new FormData(this);
        const googleFormData = new URLSearchParams();

        googleFormData.append(fieldMappings.helpful, formData.get('helpful'));
        googleFormData.append(fieldMappings.suggestions, formData.get('suggestions'));
        googleFormData.append(fieldMappings.user_name, formData.get('user_name'));
        googleFormData.append(fieldMappings.user_email, formData.get('user_email'));

        // 3. SUBMIT TO GOOGLE
        // Note: Google Forms blocks CORS, so we use 'no-cors' mode. 
        // It will submit successfully even if the browser console shows an 'error'.
        fetch(G_FORM_URL, {
            method: "POST",
            mode: "no-cors",
            body: googleFormData,
            headers: { "Content-Type": "application/x-www-form-urlencoded" }
        }).then(() => {
            // Show success message
            document.getElementById('feedback-content').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
        }).catch(error => {
            alert("Something went wrong. Please try again.");
            console.error(error);
        });
    });
</script>


</body>
</html>
